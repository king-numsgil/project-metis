
[package]
authors = ["Daniel 'Numsgil' Grondin <king@numsgil.co>"]
edition = "2021"
name = "metis_vector"
version = "0.1.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3.0.0", features = ["napi8"] }
napi-derive = "3.0.0"
lyon_tessellation = "1"
lyon_path = "1"
lyon_geom = "1"
ttf-parser = "0.21"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
strip = "symbols"
